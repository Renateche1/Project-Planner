    <script>
      // Keep the latest Gantt rendering context to reuse for copy/export
      let _lastGanttState = {
        tasks: [],
        min: null,
        max: null,
        pxPerDay: 24,
        colorByProduct: {}
      };

      // ----------------- Renumber ID ------------------------//
      function renumberIds() {
        const rows = document.querySelectorAll('#taskTable tbody tr');
        let counter = 1;

        rows.forEach((tr) => {
          const idCell = tr.querySelector('td:nth-child(2) input');
          if (idCell) {
            idCell.value = counter++;
          }
        });
      }

      // =============== DRAG & DROP ROW REORDER ===============
      let dragSrcRow = null;

      function handleDragStart(e) {
        dragSrcRow = this;
        this.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      }
      function handleDragOver(e) {
        e.preventDefault();
        this.classList.add('dragover');
        e.dataTransfer.dropEffect = 'move';
      }
      function handleDragLeave() {
        this.classList.remove('dragover');
      }
      function handleDrop(e) {
        e.stopPropagation();
        this.classList.remove('dragover');
        if (dragSrcRow !== this) {
          const tbody = this.parentNode;
          const rows = Array.from(tbody.querySelectorAll('tr'));
          const srcIndex = rows.indexOf(dragSrcRow);
          const dstIndex = rows.indexOf(this);
          if (srcIndex < dstIndex) {
            tbody.insertBefore(dragSrcRow, this.nextSibling);
          } else {
            tbody.insertBefore(dragSrcRow, this);
          }
          renumberIds();
        }
      }
      function handleDragEnd() {
        this.classList.remove('dragging');
      }
      function enableRowDragging(tr) {
        tr.addEventListener('dragstart', handleDragStart, false);
        tr.addEventListener('dragover', handleDragOver, false);
        tr.addEventListener('dragleave', handleDragLeave, false);
        tr.addEventListener('drop', handleDrop, false);
        tr.addEventListener('dragend', handleDragEnd, false);
      }

      /* ============================ PREDEFINED HOLIDAYS (dd-mm-yyyy) ============================ */
      const PREDEFINED_HOLIDAYS = [
        '01-01-2026', // Første nyttårsdag

      /* ================================== DATE HELPERS (dd-mm-yyyy) ================================== */
      function parseDate(s) {
        if (!s) return null;
        const [dd, mm, yyyy] = s.split('-').map((x) => parseInt(x, 10));
        if (!dd || !mm || !yyyy) return null;
        return new Date(yyyy, mm - 1, dd);
      }
      function fmtDate(d) {
        if (!d) return '';
        const dd = String(d.getDate()).padStart(2, '0');
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const yyyy = d.getFullYear();
        return `${dd}-${mm}-${yyyy}`;
      }
      function addDays(d, n) {
        const r = new Date(d);
        r.setDate(r.getDate() + n);
        return r;
      }
      function sameYMD(a, b) {
        return (
          a.getFullYear() === b.getFullYear() &&
          a.getMonth() === b.getMonth() &&
          a.getDate() === b.getDate()
        );
      }
      const ceilDiv = (a, b) => (b <= 0 ? 0 : Math.floor((a + b - 1) / b));

      /* =============================== WORKING DAY CALENDAR =============================== */
      function weekendMask(pattern) {
        return [...(pattern && pattern.length === 7 ? pattern : '0000011')].map((ch) => ch === '1');
      }
      function isWeekend(d, mask) {
        // JS: 0=Sun..6=Sat; pattern Mon..Sun -> index map Sun->6, Mon->0
        const dow = d.getDay();
        const idx = dow === 0 ? 6 : dow - 1;
        return mask[idx];
      }
      function isHoliday(d, hols) {
        return hols.some((h) => sameYMD(h, d));
      }
      function isWorkday(d, mask, hols) {
        return !isWeekend(d, mask) && !isHoliday(d, hols);
      }
      function nextWorkday(d, mask, hols) {
        let x = addDays(d, 1);
        while (!isWorkday(x, mask, hols)) x = addDays(x, 1);
        return x;
      }
      function addWorkdays(start, days, mask, hols) {
        let x = new Date(start),
          added = 0;
        while (added < days) {
          x = addDays(x, 1);
          if (isWorkday(x, mask, hols)) added++;
        }
        return x;
      }

      /* ============ NEW HELPERS FOR REVERSE (TARGET FINISH) SCHEDULING ============ */
      function prevWorkday(d, mask, hols) {
        let x = addDays(d, -1);
        while (!isWorkday(x, mask, hols)) x = addDays(x, -1);
        return x;
      }
      function subtractWorkdays(end, days, mask, hols) {
        let x = new Date(end),
          removed = 0;
        while (removed < days) {
          x = addDays(x, -1);
          if (isWorkday(x, mask, hols)) removed++;
        }
        return x;
      }
      function ensureWorkdayOrPrev(d, mask, hols) {
        // If d is a non-workday, move to the previous workday
        return isWorkday(d, mask, hols) ? d : prevWorkday(d, mask, hols);
      }

      /* ================================== SCHEDULER (FS) ================================== */
      // supports "start" and "finish" modes
      function calculate() {
        const mode = document.getElementById('scheduleMode')?.value || 'start';
        const project = parseDate(document.getElementById('projectStart').value.trim());
        const target = parseDate(document.getElementById('targetFinish')?.value.trim());
        const hpd = parseInt(document.getElementById('hoursPerDay').value, 10) || 8;

        const mask = weekendMask('0000011'); // Sat-Sun weekend
        const holidays = PREDEFINED_HOLIDAYS.map(parseDate);

        if (mode === 'start' && !project) {
          return alert('Invalid Project Start date (use dd-mm-yyyy).');
        }
        if (mode === 'finish' && !target) {
          return alert('Invalid Target Finish date (use dd-mm-yyyy).');
        }

        const rows = getRows();
        const map = new Map();

        // Build task map (only tasks with IDs take part in dependency graph)
        for (const r of rows) {
          if (!r.id) continue;
          const id = parseInt(r.id, 10);
          if (isNaN(id)) return alert('Invalid ID: ' + r.id);
          if (map.has(id)) return alert('Duplicate ID: ' + id);

          map.set(id, {
            id,
            activity: r.activity,
            name: r.name,
            dur: parseInt(r.dur || '0', 10),
            preds: r.preds || '',
            product: r.product,
            manual: r.manual ? parseDate(r.manual) : null,
            cStart: null,
            cFinish: null,
            _dom: r
          });
        }

        // Build graph (FS): pred -> [succ], indegree for topo
        const indeg = new Map();
        const graph = new Map();
        for (const id of map.keys()) indeg.set(id, 0);

        const parseIds = (csv) =>
          csv
            ? csv
                .split(',')
                .map((x) => x.trim())
                .filter(Boolean)
                .map(Number)
            : [];

        for (const t of map.values()) {
          const ps = parseIds(t.preds);
          for (const p of ps) {
            if (!map.has(p)) return alert(`Unknown predecessor ${p} for task ${t.id}`);
            if (!graph.has(p)) graph.set(p, []);
            graph.get(p).push(t.id);
            indeg.set(t.id, (indeg.get(t.id) || 0) + 1);
          }
        }

        // Kahn's algorithm for topological order (preds before succs)
        const q = [...[...indeg.entries()].filter(([_, d]) => d === 0)].map(([id]) => id);
        const order = [];
        while (q.length) {
          const u = q.shift();
          order.push(u);
          for (const v of graph.get(u) || []) {
            indeg.set(v, indeg.get(v) - 1);
            if (indeg.get(v) === 0) q.push(v);
          }
        }
        if (order.length !== map.size) return alert('Cycle detected in predecessors.');

        const violations = [];

        if (mode === 'start') {
          // -------- FORWARD: From Project Start --------
          for (const id of order) {
            const t = map.get(id);
            let start = new Date(project);

            // Start after latest predecessor finish (next workday)
            const ps = parseIds(t.preds);
            if (ps.length) {
              let latest = null;
              for (const p of ps) {
                const pt = map.get(p);
                if (!pt.cFinish) return alert(`Missing predecessor finish for Task ${t.id}.`);
                if (!latest || pt.cFinish > latest) latest = pt.cFinish;
              }
              start = nextWorkday(latest, mask, holidays);
            }

            // Manual start constraint (push later if needed; adjust to next workday)
            if (t.manual && t.manual > start) {
              start = t.manual;
              if (!isWorkday(start, mask, holidays)) {
                start = nextWorkday(addDays(start, -1), mask, holidays);
              }
            }

            // Convert hours -> business days (ceil). If positive duration < 1 day, force 1 day.
            let d = ceilDiv(t.dur, hpd);
            if (t.dur > 0 && d < 1) d = 1;

            const finish = d <= 1 ? new Date(start) : addWorkdays(start, d - 1, mask, holidays);

            t.cStart = start;
            t.cFinish = finish;
          }
        } else {
          // -------- BACKWARD: From Target Finish --------
          const targetWorkday = ensureWorkdayOrPrev(new Date(target), mask, holidays);

          // Process in reverse topological order (successors first)
          for (const id of order.slice().reverse()) {
            const t = map.get(id);
            const succs = graph.get(id) || [];

            // --- 1) Compute the baseline finish-limit from target or successors' BASELINE starts ---
            let baselineFinishLimit = new Date(targetWorkday);

            if (succs.length) {
              // Use successors' BASELINE start (not their manual-adjusted cStart) to avoid moving predecessors
              let earliestSuccBaselineStart = null;

              for (const sid of succs) {
                const st = map.get(sid);
                if (!st._baselineStart) {
                  return alert(
                    `Internal error: successor baseline start not ready for Task ${t.id}.`
                  );
                }
                if (!earliestSuccBaselineStart || st._baselineStart < earliestSuccBaselineStart) {
                  earliestSuccBaselineStart = st._baselineStart;
                }
              }

              // Predecessor must finish the workday BEFORE the successor's BASELINE start
              baselineFinishLimit = prevWorkday(earliestSuccBaselineStart, mask, holidays);
            }

            // Convert hours -> business days (ceil; 0h => 0 days allowed)
            let d = ceilDiv(t.dur, hpd);
            if (t.dur > 0 && d < 1) d = 1;

            // --- Baseline reverse dates (ignoring manual) ---
            const baselineFinish = new Date(baselineFinishLimit);
            const baselineStart =
              d <= 1
                ? new Date(baselineFinish)
                : subtractWorkdays(baselineFinish, d - 1, mask, holidays);

            // Store BASELINE for successors to read
            t._baselineStart = new Date(baselineStart);
            t._baselineFinish = new Date(baselineFinish);

            // --- 2) Apply manual start ONLY to this task (does not pull predecessors) ---
            let start = new Date(baselineStart);
            let finish = new Date(baselineFinish);

            if (t.manual) {
              let man = new Date(t.manual);

              // Treat manual date as "Start No Earlier Than":
              // If manual falls on a non-workday, snap FORWARD to the next workday.
              if (!isWorkday(man, mask, holidays)) {
                man = nextWorkday(man, mask, holidays);
              }

              // Always apply the manual date to THIS task's start (earlier or later),
              // but do NOT propagate it upstream (predecessors read _baselineStart only).
              start = man;
              finish = d <= 1 ? new Date(start) : addWorkdays(start, d - 1, mask, holidays);
            }

            // --- 3) Record violation if this task now exceeds its baseline (target-driven) finish ---
            if (finish > baselineFinish) {
              violations.push(t.id);
            }

            // Final dates written back
            t.cStart = start;
            t.cFinish = finish;
          }
        }

        // Write results back to the table
        for (const r of rows) {
          const id = r.id ? parseInt(r.id, 10) : null;
          if (id && map.has(id)) {
            const t = map.get(id);
            r.calcStart.textContent = fmtDate(t.cStart);
            r.calcFinish.textContent = fmtDate(t.cFinish);
          } else {
            r.calcStart.textContent = '';
            r.calcFinish.textContent = '';
          }
        }

        updateFilter();
        const tasksForGantt = [...map.values()];
        renderGantt(tasksForGantt);

        if (violations.length) {
          alert(
            baseMsg + `\nWarning: Target not fully met for task IDs: ${violations.join(', ')}.`
          );
        } else {
          alert(baseMsg);
        }
      }

      // ======================= IMPORT CSV WITH KNOWN HEADERS =======================
      // Incoming headers expected (case-insensitive):
      // Activity Code | Activity Description | Hours | Product Code | CCN | Start Date | End Date | Activity Responsible

      function parseCsvText_known(text) {
        const firstLine = text.split(/\r?\n/, 1)[0] || '';
        const delimiter = firstLine.includes(';') ? ';' : ',';

        const rows = [];
        let i = 0,
          field = '',
          row = [],
          inQuotes = false;

        const pushField = () => {
          row.push(field);
          field = '';
        };
        const pushRow = () => {
          rows.push(row);
          row = [];
        };

        while (i < text.length) {
          const ch = text[i];
          if (inQuotes) {
            if (ch === '"') {
              if (text[i + 1] === '"') {
                field += '"';
                i += 2;
                continue;
              }
              inQuotes = false;
              i++;
              continue;
            } else {
              field += ch;
              i++;
              continue;
            }
          } else {
            if (ch === '"') {
              inQuotes = true;
              i++;
              continue;
            }
            if (ch === delimiter) {
              pushField();
              i++;
              continue;
            }
            if (ch === '\n') {
              pushField();
              pushRow();
              i++;
              continue;
            }
            if (ch === '\r') {
              pushField();
              if (text[i + 1] === '\n') i++;
              pushRow();
              i++;
              continue;
            }
            field += ch;
            i++;
            continue;
          }
        }
        pushField();
        pushRow();

        // Trim trailing empty rows
        while (rows.length && rows[rows.length - 1].every((c) => (c ?? '') === '')) rows.pop();

        return { rows, delimiter };
      }

      function normalizeDate_ddmmyyyy(s) {
        s = String(s || '').trim();
        if (!s) return '';
        if (/^\d{2}-\d{2}-\d{4}$/.test(s)) return s;

        // yyyy-mm-dd or yyyy/mm/dd
        let m = s.match(/^(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})$/);
        if (m) {
          const yyyy = m[1],
            mm = m[2].padStart(2, '0'),
            dd = m[3].padStart(2, '0');
          return `${dd}-${mm}-${yyyy}`;
        }
        // dd.mm.yyyy or dd/mm/yyyy
        m = s.match(/^(\d{1,2})[.\-/](\d{1,2})[.\-/](\d{4})$/);
        if (m) {
          const dd = m[1].padStart(2, '0'),
            mm = m[2].padStart(2, '0'),
            yyyy = m[3];
          return `${dd}-${mm}-${yyyy}`;
        }
        return s;
      }

      function loadCsvWithSpecificHeaders(parsed) {
        const rows = parsed.rows;
        if (!rows.length) {
          alert('CSV appears to be empty.');
          return;
        }

        // normalize to lowercase
        const header = rows[0].map((h) =>
          String(h || '')
            .trim()
            .toLowerCase()
        );

        // fixed index map (all lowercase)
        const idx = {
          activity: header.indexOf('activity code'),
          name: header.indexOf('activity description'),
          dur: header.indexOf('hours'),
          product: header.indexOf('product code'),
          ccn: header.indexOf('ccn'),
          calcStart: header.indexOf('start date'),
          calcFinish: header.indexOf('end date'),
          responsible: header.indexOf('activity responsible')
        };

        // Basic validation: require Activity Description and Start/End
        const essential = ['name', 'calcStart', 'calcFinish'];
        const missing = essential.filter((k) => idx[k] === -1);
        if (missing.length) {
          alert('CSV is missing essential headers: ' + missing.join(', '));
          return;
        }

        const tbody = document.querySelector('#taskTable tbody');
        tbody.innerHTML = '';

        const valFor = (line, key) => {
          const i = idx[key];
          return i >= 0 && i < line.length ? String(line[i] ?? '').trim() : '';
        };

        for (let r = 1; r < rows.length; r++) {
          const line = rows[r];
          if (!line || line.every((c) => String(c ?? '').trim() === '')) continue;

          const t = {
            activity: valFor(line, 'activity'),
            name: valFor(line, 'name'),
            dur: valFor(line, 'dur'),
            product: valFor(line, 'product'),
            ccn: valFor(line, 'ccn'),
            calcStart: normalizeDate_ddmmyyyy(valFor(line, 'calcStart')),
            calcFinish: normalizeDate_ddmmyyyy(valFor(line, 'calcFinish')),
            responsible: valFor(line, 'responsible')
          };

          addEmptyRow();
          const c = document.querySelector('#taskTable tbody tr:last-child').querySelectorAll('td');
          c[1].querySelector('input').value = ''; // ID
          c[2].querySelector('input').value = ''; // Predecessor
          c[3].querySelector('input').value = t.activity; // Activity Code
          c[4].querySelector('input').value = t.name; // Task Name
          c[5].querySelector('input').value = t.dur; // Duration (h)
          c[6].querySelector('input').value = t.product; // Product Code
          c[7].querySelector('input').value = t.ccn; // CCN
          c[8].querySelector('input').value = ''; // Manual Start
          c[9].textContent = t.calcStart; // Calculated Start (from CSV)
          c[10].textContent = t.calcFinish; // Calculated Finish (from CSV)
          c[11].querySelector('input').value = t.responsible; // Responsible
          renumberIds();
        }

        updateFilter();
        alert(
          'CSV imported with mapped headers. You can now Calculate to recompute dates if needed.'
        );
      }

      // Wire up the Import button (single set of listeners)
      document.getElementById('importCsv')?.addEventListener('click', () => {

          }
        };
        reader.readAsText(file, 'utf-8');
        e.target.value = ''; // allow re-import of same file
      });

      /* ================================== COPY HTML ================================== */
      async function copyPlanAsHtml() {
        const rows = getRows().filter((r) => r.el.style.display !== 'none'); // respect filter
        if (!rows.length) {
          alert('No tasks to copy.');
          return;
        }

        const projectName = (document.getElementById('projectName')?.value || '').trim();
        const titleHtml = projectName
          ? `<div style="font:600 16px system-ui,Segoe UI,Arial; margin-bottom:6px;">Project: ${escapeHtml(projectName)}</div>`
          : '';

        const cols = [
          { h: 'Activity Code', get: (r) => r.activity },
          { h: 'Activity Description', get: (r) => r.name },
          { h: 'Duration (h)', get: (r) => r.dur },
          { h: 'Product', get: (r) => r.product },
          { h: 'CCN', get: (r) => r.ccn },
          { h: 'Start', get: (r) => r.calcStart.textContent },
          { h: 'Finish', get: (r) => r.calcFinish.textContent },
          { h: 'Responsible', get: (r) => r.responsible }
        ];

        const tableStart = `
    <table cellspacing="0" cellpadding="6" style="border-collapse:collapse; font:14px system-ui,Segoe UI,Arial; border:1px solid #d1d5db;">
      <thead>
        <tr style="background:#eef2f7; color:#374151;">
          ${cols.map((c) => `<th style="border:1px solid #d1d5db; text-align:left;">${escapeHtml(c.h)}</th>`).join('')}
        </tr>
      </thead>
      <tbody>
  `;
        const tableRows = rows
          .map((r, idx) => {
            const bg = idx % 2 ? '#f9fafb' : '#ffffff';
            return `<tr style="background:${bg}; color:#111827;">
      ${cols.map((c) => `<td style="border:1px solid #e5e7eb; white-space:nowrap;">${escapeHtml(String(c.get(r) ?? ''))}</td>`).join('')}
    </tr>`;
          })
          .join('');
        const tableEnd = `</tbody></table>`;

        const html = titleHtml + tableStart + tableRows + tableEnd;

        try {
          const item = new ClipboardItem({
            'text/html': new Blob([html], { type: 'text/html' }),
            'text/plain': new Blob([stripHtml(html)], { type: 'text/plain' })
          });
          await navigator.clipboard.write([item]);
          alert('Plan copied as HTML. Paste into your email (Ctrl+V).');
        } catch (err) {
          const div = document.createElement('div');
          div.contentEditable = 'true';
          div.style.position = 'fixed';
          div.style.opacity = '0';
          div.innerHTML = html;
          document.body.appendChild(div);

          const range = document.createRange();
          range.selectNodeContents(div);
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);

          try {
            document.execCommand('copy');
            alert('Plan copied as HTML. Paste into your email.');
          } catch {
            alert('Copy failed. Please try Copy as Text.');
          } finally {
            sel.removeAllRanges();
            document.body.removeChild(div);
          }
        }
      }

      // Small helpers
      function escapeHtml(s) {
        return String(s).replace(
          /[&<>"']/g,
          (m) =>
            ({
              '&': '&amp;',
              '<': '&lt;',
              '>': '&gt;',
              '"': '&quot;',
              "'": '&#39;'
            })[m]
        );
      }
      function stripHtml(s) {
        const tmp = document.createElement('div');
        tmp.innerHTML = s;
        return tmp.textContent || tmp.innerText || '';
      }

      /* ================================== CSV EXPORT (dd-mm-yyyy) ================================== */
      function exportCsv() {
        const rows = getRows();
        const headers = [
          'Activity Code',
          'Activity Description',
          'Hours',
          'Product Code',
          'CCN',
          'Start Date',
          'End Date',
          'Activity Responsible'
        ];
        const data = rows.map((r) => [
          r.activity,
          r.name,
          r.dur,
          r.product,
          r.ccn,
          r.calcStart.textContent,
          r.calcFinish.textContent,
          r.responsible
        ]);
        const esc = (s) => (/[",\n;]/.test(s) ? `"${String(s).replace(/"/g, '""')}"` : s);
        const csv =
          headers.map(esc).join(';') +
          '\n' +
          data.map((row) => row.map((x) => esc(String(x ?? ''))).join(';')).join('\n');

        // Get project name from input field
        let projectName = document.getElementById('projectName').value.trim();
        if (!projectName) {
          projectName = 'Project Planning'; // fallback
        }
        projectName = projectName.replace(/[^a-z0-9_\-]/gi, '_');

        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = projectName + '.csv';
        a.click();
        URL.revokeObjectURL(url);
      }

      /* ================================== GANTT CHART ================================== */
      function renderGantt(tasks) {
        const chart = document.getElementById('ganttChart');
        const tooltip = ensureTooltip();

        chart.innerHTML = '';
        if (!tasks.length) return;

        const min = new Date(Math.min(...tasks.map((t) => t.cStart)));
        const max = new Date(Math.max(...tasks.map((t) => t.cFinish)));

        const pxPerDay = 24;

        const holidays = PREDEFINED_HOLIDAYS.map(parseDate);

        // Color palettes for product codes

        const palette = [
          '#0078D4', // Azure/Fluent brand blue (ADO)
          '#8A8886', // Neutral mid (labels/secondary in ADO)
          '#038387', // Teal (Fluent accent)
          '#C19C00', // Brass/Gold accent
          '#881798', // Purple accent
          '#D13438', // Fluent red
          '#498205', // Green accent
          '#605E5C', // Neutral darker
          '#FFB900' // Yellow accent
        ];

        const colorByProduct = {};
        let ci = 0;

        tasks.forEach((t) => {
          if (!colorByProduct[t.product]) {
            colorByProduct[t.product] = palette[ci++ % palette.length];
          }
        });

        /* ---- Weekend & holiday shading ---- */
        const days = Math.floor((max - min) / (1000 * 3600 * 24)) + 1;

        for (let i = 0; i < days; i++) {
          const date = new Date(min);
          date.setDate(min.getDate() + i);

          const left = i * pxPerDay;

          const isHolidayDay = holidays.some((h) => sameYMD(h, date));
          const isWeekendDay = isWeekend(date, weekendMask('0000011'));

          if (isWeekendDay || isHolidayDay) {
            const shade = document.createElement('div');
            shade.style.pointerEvents = 'none';
            shade.style.position = 'absolute';
            shade.style.left = left + 'px';
            shade.style.width = pxPerDay + 'px';
            shade.style.top = '0';
            shade.style.bottom = '0';
            shade.style.zIndex = 0;
            shade.style.background = isHolidayDay
              ? 'rgba(179, 43, 43, 0.25)'
              : 'rgba(65, 65, 65, 0.35)';
            chart.appendChild(shade);
          }
        }

        /* ---- Bars only (no labels) ---- */
        tasks.forEach((t) => {
          const row = document.createElement('div');
          row.className = 'gantt-row';

          const offset = Math.floor((t.cStart - min) / (1000 * 3600 * 24));
          const dur = Math.floor((t.cFinish - t.cStart) / (1000 * 3600 * 24)) + 1;

          const bar = document.createElement('div');
          bar.className = 'gantt-bar';
          bar.style.left = offset * pxPerDay + 'px';
          bar.style.width = dur * pxPerDay + 'px';
          bar.style.background = colorByProduct[t.product] || '#555';
          bar.textContent = `${t.product} ${t.name}`;
          bar.style.zIndex = 2;

          /* Tooltip */
          bar.addEventListener('mousemove', (e) => {
            const padding = 12;
            const x = e.clientX + 15;
            const y = e.clientY + 10;

            tooltip.style.display = 'block';
            tooltip.textContent = `${t.product} – ${t.name} | ${fmtDate(t.cStart)} → ${fmtDate(t.cFinish)}`;

            tooltip.style.left = x + 'px';
            tooltip.style.top = y + 'px';

            const vw = window.innerWidth;
            const vh = window.innerHeight;
            const tw = tooltip.offsetWidth;
            const th = tooltip.offsetHeight;

            tooltip.style.left = Math.min(x, vw - tw - padding) + 'px';
            tooltip.style.top = Math.min(y, vh - th - padding) + 'px';
          });

          bar.addEventListener('mouseleave', () => {
            tooltip.style.display = 'none';
          });

          row.appendChild(bar);
          chart.appendChild(row);
        });

        chart.style.width = days * pxPerDay + 40 + 'px';

        // Save state for copy/export
        _lastGanttState = { tasks, min, max, pxPerDay, colorByProduct };
      }

      // -------------------------------- COPY GANTT PNG -----------------------------------------//
      async function copyGanttAsPng() {
        const { tasks, min, max, pxPerDay, colorByProduct } = _lastGanttState || {};
        if (!tasks || !tasks.length || !min || !max) {
          alert('No Gantt data to copy. Please Calculate first.');
          return;
        }

        // Layout parameters (match your render)
        const rowHeight = 26;
        const barHeight = 20;
        const rowGap = 6;
        const topPadding = 16;
        const leftPadding = 12;
        const rightPadding = 12;
        const bottomPadding = 16;

        const days = Math.floor((max - min) / (1000 * 3600 * 24)) + 1;
        const width = leftPadding + days * pxPerDay + rightPadding;
        const height = topPadding + tasks.length * (rowHeight + rowGap) + bottomPadding;

        const holidays = PREDEFINED_HOLIDAYS.map(parseDate);
        const isWkd = (d) => isWeekend(d, weekendMask('0000011'));
        const isHol = (d) => holidays.some((h) => sameYMD(h, d));

        // Create canvas
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');

        // Azure DevOps–style Background & Grid Colors
        const dark = document.body.classList.contains('dark');

        // ADO neutral dark canvas (~ rgb(32,31,30) / #201F1E)
        const bg = dark ? '#201F1E' : '#FFFFFF';

        // Weekend shading: subtle neutral (ADO uses very low‑contrast neutrals)
        const gridWeekend = dark
          ? 'rgba(255,255,255,0.06)' // subtle, non-intrusive
          : 'rgba(200,200,200,0.35)';

        // Holiday shading: keep the yellow tint but tone it darker for ADO dark mode
        const gridHoliday = dark
          ? 'rgba(179, 43, 43, 0.25)' // softer than your previous 0.35
          : 'rgba(255,230,128,0.45)';

        // Text color in ADO dark = white at ~95% opacity
        const textColor = dark ? 'rgba(255,255,255,0.95)' : '#242424';

        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, width, height);

        // Day shading (weekend/holiday)
        for (let i = 0; i < days; i++) {
          const date = new Date(min);
          date.setDate(min.getDate() + i);
          const x = leftPadding + i * pxPerDay;

          const wk = isWkd(date);
          const hol = isHol(date);

          if (wk || hol) {
            ctx.fillStyle = hol ? gridHoliday : gridWeekend;
            ctx.fillRect(x, 0, pxPerDay, height);
          }
        }

        // Draw bars
        ctx.textBaseline = 'middle';
        ctx.font = '600 11px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif';

        tasks.forEach((t, idx) => {
          const offsetDays = Math.floor((t.cStart - min) / (1000 * 3600 * 24));
          const durDays = Math.floor((t.cFinish - t.cStart) / (1000 * 3600 * 24)) + 1;

          const x = leftPadding + offsetDays * pxPerDay;
          const y = topPadding + idx * (rowHeight + rowGap);
          const w = Math.max(1, durDays * pxPerDay);
          const h = barHeight;

          // Bar
          ctx.fillStyle = colorByProduct[t.product] || '#555';
          ctx.strokeStyle = 'rgba(0,0,0,0.15)';
          const radius = 6;

          // Rounded rect
          ctx.beginPath();
          ctx.moveTo(x + radius, y);
          ctx.lineTo(x + w - radius, y);
          ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
          ctx.lineTo(x + w, y + h - radius);
          ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
          ctx.lineTo(x + radius, y + h);
          ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
          ctx.lineTo(x, y + radius);
          ctx.quadraticCurveTo(x, y, x + radius, y);
          ctx.closePath();
          ctx.fill();

          // Label — show Product Code (you changed in DOM too)
          const label = (t.product + t.name || '').toString();
          ctx.fillStyle = '#ffffff';
          const tx = x + 4;
          const ty = y + h / 2;
          // Clip text to bar
          ctx.save();
          ctx.beginPath();
          ctx.rect(x, y, w, h);
          ctx.clip();
          ctx.fillText(label, tx, ty);
          ctx.restore();
        });

        try {
          // Prefer writing an actual image to clipboard
          const blob = await new Promise((res) => canvas.toBlob(res, 'image/png'));
          if (!blob) throw new Error('Canvas toBlob failed.');

          const item = new ClipboardItem({
            'image/png': blob,
            'text/html': new Blob([`<img alt="Gantt" src="${canvas.toDataURL('image/png')}" />`], {
              type: 'text/html'
            })
          });

          await navigator.clipboard.write([item]);
          alert('Gantt copied as image. Paste into your email (Ctrl+V).');
        } catch (err) {
          // Fallback using a hidden contentEditable div to copy HTML <img>
          try {
            const imgHtml = `<img alt="Gantt" src="${canvas.toDataURL('image/png')}" />`;
            const div = document.createElement('div');
            div.contentEditable = 'true';
            div.style.position = 'fixed';
            div.style.opacity = '0';
            div.innerHTML = imgHtml;
            document.body.appendChild(div);

            const range = document.createRange();
            range.selectNodeContents(div);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);

            document.execCommand('copy');
            sel.removeAllRanges();
            document.body.removeChild(div);

            alert('Gantt copied as image (fallback). Paste into your email.');
          } catch (fallbackErr) {
            console.error(fallbackErr);
            // Final fallback: download PNG
            const a = document.createElement('a');
            a.href = canvas.toDataURL('image/png');
            a.download = 'gantt.png';
            a.click();
            alert('Clipboard not available. Downloaded gantt.png instead.');
          }
        }
      }

      /* ========================================================================== */
      /*                                     INIT                                   */
      /* ========================================================================== */
      document.getElementById('projectStart').value = fmtDate(new Date()); // today's date dd-mm-yyyy
      document.getElementById('addRow').addEventListener('click', addEmptyRow);
      document.getElementById('removeSelected').addEventListener('click', removeSelected);
      document.getElementById('loadSample').addEventListener('click', loadSample);
      document.getElementById('calculate').addEventListener('click', calculate);
      document.getElementById('exportCsv').addEventListener('click', exportCsv);
      document.getElementById('clearAll').addEventListener('click', clearAll);
      document.getElementById('addProgram').addEventListener('click', addProgramImplementation);
      document.getElementById('addDocumentation').addEventListener('click', addDocumentation);
      document.getElementById('copyHtml').addEventListener('click', copyPlanAsHtml);
      document.getElementById('copyGantt').addEventListener('click', copyGanttAsPng);
      document.getElementById('toggleTheme').addEventListener('click', () => {
        const btn = document.getElementById('toggleTheme');
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');

        localStorage.setItem('scheduler-theme', isDark ? 'dark' : 'light');
        btn.textContent = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';
      });

      // One starter row
      addEmptyRow();
      renumberIds();

      // DARK MODE TOGGLE + SAVE PREFERENCE
      (function initTheme() {
        const saved = localStorage.getItem('scheduler-theme');
        const btn = document.getElementById('toggleTheme');

        if (saved === 'dark') {
          document.body.classList.add('dark');
          btn.textContent = '☀️ Light Mode';
        } else {
          btn.textContent = '🌙 Dark Mode';
        }
      })();

      /* ============================================================
   DRAG & DROP CSV IMPORT
============================================================ */

      const dropZone = document.getElementById('csvDropZone');
      const fileInput = document.getElementById('csvFileInput');

      // Click-to-upload
      dropZone.addEventListener('click', () => fileInput.click());

      // Add visual highlight on dragover
      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
      });

      // Remove highlight when leaving
      dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
      });

      // Handle file drop
      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');

        const file = e.dataTransfer.files?.[0];
        if (!file) return;

        if (!file.name.toLowerCase().endsWith('.csv')) {
          alert('Please drop a .csv file.');
          return;
        }

        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const parsed = parseCsvText_known(ev.target.result || '');
            loadCsvWithSpecificHeaders(parsed);
          } catch (err) {
            console.error(err);
            alert('Failed to parse CSV.');
          }
        };
        reader.readAsText(file, 'utf-8');
      });

      // Standard file input fallback
      fileInput.addEventListener('change', (e) => {
        const file = e.target.files?.[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const parsed = parseCsvText_known(ev.target.result || '');
            loadCsvWithSpecificHeaders(parsed);
          } catch (err) {
            console.error(err);
            alert('Failed to parse CSV.');
          }
        };
        reader.readAsText(file, 'utf-8');
        e.target.value = '';
      });
    </script>
